<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Story</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/v1/kakao.min.js"></script>
    <script src="https://js.tosspayments.com/v1/payment"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>

<body>

    <header class="header-neon">
        <h1 class="logo-neon" onclick="location.reload()">Fortune Story</h1>
    </header>

    <div class="star-bg-fixed"></div>

    <section id="login-section" class="main-landing">
        <div class="hero-container">
            <div class="satisfaction-badge">⭐ 만족도 4.9/5.0 | VIP 전담 리포트</div>
            <h2 class="hero-title">당신의 <span>진짜 운명</span>을<br>마주할 준비가 되셨습니까?</h2>
            <div class="login-card">
                <p style="color:#EEDCFF; margin-bottom:20px; font-weight:bold;">운명 기록소가 준비되었습니다.</p>
                <button onclick="loginWithKakao()" class="kakao-btn">💬 카카오톡으로 3초 만례 시작하기</button>
            </div>
        </div>
    </section>

    <section id="gateway" class="dashboard-section" style="display: none;">
        <h2 style="color: #FFDF73; margin-bottom: 40px;">어떤 운명의 문을 여시겠습니까?</h2>
        <div style="max-width: 400px; margin: 0 auto; position: relative; z-index: 50;">
            <div style="margin-bottom: 30px;">
                <button class="neon-btn btn-saju" onclick="selectPath('saju')">☯ 천명의 지혜, 사주</button>
                <p style="color:#aaa; font-size:0.85rem; margin-top:10px;">타고난 오행과 올해의 흐름 분석</p>
            </div>
            <div style="margin-bottom: 30px;">
                <button class="neon-btn btn-tarot" onclick="selectPath('tarot')">🃏 영혼의 거울, 타로</button>
                <p style="color:#aaa; font-size:0.85rem; margin-top:10px;">현재의 고민에 대한 우주의 조언</p>
            </div>
            <div style="margin-bottom: 30px;">
                <button class="neon-btn btn-face" onclick="selectPath('face')">⏳ 운명의 기록, 관상</button>
                <p style="color:#aaa; font-size:0.85rem; margin-top:10px;">얼굴에 기록된 재물과 성공운 해독</p>
            </div>
        </div>
    </section>

    <section id="daily" class="dashboard-section" style="display: none; padding-top: 100px;">
    </section>

    <script src="script.js"></script>
</body>

</html>
