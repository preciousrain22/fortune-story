<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fortune Story - 프리미엄 운명 분석</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/v1/kakao.min.js"></script>
    <script src="https://js.tosspayments.com/v1/payment"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>

<body>

    <header class="header-neon">
        <h1 class="logo-neon" onclick="location.reload()">Fortune Story</h1>
    </header>

    <div class="star-bg-fixed"></div>

    <header class="header-neon">
        <h1 class="logo-neon" onclick="location.reload()">Fortune Story</h1>
    </header>

    <div class="star-bg-fixed"></div>

    <section id="login-section" class="main-landing">
        <div class="hero-container">
            <h2 style="font-size: 2.2rem; font-weight: 900; margin-bottom: 2rem;">당신의 <span style="color:#FFDF73;">진짜
                    운명</span>을<br>마주할 준비가 되셨습니까?</h2>
            <div class="login-card">
                <p style="color:#EEDCFF; margin-bottom:20px; font-weight:bold;">당신의 운명을 확인 해보시겠습니까?</p>
                <button onclick="loginWithKakao()" class="kakao-btn pulse-btn"
                    style="box-shadow: 0 5px 15px rgba(254, 229, 0, 0.3);">
                    <span style="font-size: 1.2rem; margin-right: 8px; vertical-align: middle;">⚜️</span> 카카오 계정으로 VIP
                    입장하기
                </button>
            </div>
        </div>
    </section>

    <section id="gateway" class="dashboard-section" style="display: none;">
        <h2 style="color: #FFDF73; margin-bottom: 40px; font-weight: 800;">어떤 운명의 문을 여시겠습니까?</h2>
        <div style="max-width: 400px; margin: 0 auto; position: relative; z-index: 50;">
            <div style="margin-bottom: 30px;">
                <button class="neon-btn btn-saju" onclick="selectPath('saju')">☯ 천명의 지혜, 사주</button>
                <p style="color:#aaa; font-size:0.85rem; margin-top:10px;">타고난 오행과 올해의 흐름 분석</p>
            </div>
            <div style="margin-bottom: 30px;">
                <button class="neon-btn btn-tarot" onclick="selectPath('tarot')">🃏 영혼의 거울, 타로</button>
                <p style="color:#aaa; font-size:0.85rem; margin-top:10px;">현재의 고민에 대한 우주의 조언</p>
            </div>
            <div style="margin-bottom: 30px;">
                <button class="neon-btn btn-face" onclick="selectPath('face')">⏳ 운명의 기록, 관상</button>
                <p style="color:#aaa; font-size:0.85rem; margin-top:10px;">얼굴에 기록된 재물과 성공운 해독</p>
            </div>
        </div>
    </section>

    <section id="faceSection" class="dashboard-section" style="display: none; padding-top: 100px;">
        <div class="container input-container">
            <div class="section-header text-center">
                <h2 style="color: #81D4FA; letter-spacing: 2px; text-shadow: 0 0 15px rgba(129, 212, 250, 0.3);">얼굴에 담긴
                    운명, 관상</h2>
                <p style="color: #4FC3F7;">정면을 응시한 밝은 사진을 업로드해주세요.</p>
            </div>
            <div
                style="max-width: 400px; margin: 2rem auto; border: 2px dashed #4FC3F7; padding: 2rem; border-radius: 15px; text-align: center; background: rgba(0,0,0,0.3);">
                <input type="file" id="faceImageInput" accept="image/jpeg, image/png" style="display: none;"
                    onchange="previewFaceImage(event)">
                <button onclick="document.getElementById('faceImageInput').click()" class="btn-premium outline"
                    style="border-color: #81D4FA; color: #81D4FA !important; width: 100%;">📸 내 사진 선택하기</button>
                <img id="facePreview"
                    style="max-width: 100%; margin-top: 1.5rem; border-radius: 10px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">
            </div>
            <div class="text-center">
                <button onclick="startFaceReading()" class="btn-premium pulse-btn"
                    style="background: linear-gradient(135deg, #0288D1, #4FC3F7); color: #fff; width: 100%; max-width: 400px; border: none;">✨
                    관상 분석 시작</button>
            </div>
        </div>
    </section>

    <section id="daily" class="dashboard-section" style="display: none; padding-top: 100px;">
        <div
            style="max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3);">
            <h3 class="obangsaek-text" style="margin-bottom: 2rem; font-size: 1.5rem; text-align: center;">명식 정보 입력</h3>
            <form id="sajuForm">
                <div style="margin-bottom: 20px; text-align: left;">
                    <label style="color:#FFDF73; display: block; margin-bottom: 8px; font-weight: bold;">분석 종류</label>
                    <select id="fortuneType" class="premium-input">
                        <option value="daily">오늘의 운세</option>
                        <option value="weekly">주간 운세</option>
                        <option value="yearly">1년 심층 운세</option>
                        <option value="love">애정/연애운</option>
                    </select>
                </div>
                <div style="margin-bottom: 20px; text-align: left;">
                    <label style="color:#FFDF73; display: block; margin-bottom: 8px; font-weight: bold;">성함</label>
                    <input type="text" id="name" placeholder="성함을 입력하세요" required>
                </div>
                <div style="margin-bottom: 20px; text-align: left;">
                    <label style="color:#FFDF73; display: block; margin-bottom: 8px; font-weight: bold;">생년월일</label>
                    <div class="input-grid-3">
                        <input type="tel" id="birthYear" placeholder="연도(YYYY)" maxlength="4" required>
                        <input type="tel" id="birthMonth" placeholder="월(MM)" maxlength="2" required>
                        <input type="tel" id="birthDay" placeholder="일(DD)" maxlength="2" required>
                    </div>
                </div>
                <div style="margin-bottom: 20px; text-align: left;">
                    <label style="color:#FFDF73; display: block; margin-bottom: 8px; font-weight: bold;">태어난 시간 (24시
                        형식)</label>
                    <div class="input-grid-2">
                        <input type="tel" id="birthHour" placeholder="시(0~23)" maxlength="2">
                        <input type="tel" id="birthMinute" placeholder="분(0~59)" maxlength="2">
                    </div>
                    <div style="margin-top: 12px; display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="unknownTime" style="width: 20px; height: 20px;">
                        <label for="unknownTime" style="color: #aaa; font-size: 0.95rem;">시간 모름</label>
                    </div>
                </div>
                <div style="margin-bottom: 20px; text-align: left;">
                    <label style="color:#FFDF73; display: block; margin-bottom: 8px; font-weight: bold;">양력/음력</label>
                    <div style="display: flex; gap: 20px; padding-top: 5px;">
                        <label style="color:#fff; cursor: pointer;"><input type="radio" name="calendarType"
                                value="solar" checked> 양력</label>
                        <label style="color:#fff; cursor: pointer;"><input type="radio" name="calendarType"
                                value="lunar"> 음력</label>
                    </div>
                </div>
                <button type="submit"
                    style="width: 100%; padding: 20px; background: linear-gradient(135deg, #FFDF73, #D4AF37); color: #000; border: none; border-radius: 50px; font-weight: 900; font-size: 1.1rem; margin-top: 20px; cursor: pointer;">✨
                    정밀 분석 시작하기</button>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
